<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#gradient)" stroke="#4F46E5" stroke-width="3"/>
  
  <!-- AI Head / Robot Icon -->
  <g transform="translate(30, 25)">
    <!-- Head -->
    <rect x="5" y="15" width="50" height="40" rx="8" fill="white" stroke="#4F46E5" stroke-width="2"/>
    
    <!-- Antenna -->
    <line x1="30" y1="15" x2="30" y2="5" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="5" r="4" fill="#F59E0B"/>
    
    <!-- Eyes -->
    <circle cx="20" cy="32" r="6" fill="#4F46E5"/>
    <circle cx="40" cy="32" r="6" fill="#4F46E5"/>
    <circle cx="21" cy="31" r="2" fill="white"/>
    <circle cx="41" cy="31" r="2" fill="white"/>
    
    <!-- Mouth / Sound waves -->
    <rect x="18" y="42" width="24" height="4" rx="2" fill="#4F46E5"/>
    <path d="M15 48 Q20 52 25 48" stroke="#4F46E5" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35 48 Q40 52 45 48" stroke="#4F46E5" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Microphone indicator -->
  <circle cx="60" cy="82" r="12" fill="#10B981" stroke="white" stroke-width="2"/>
  <rect x="56" y="75" width="8" height="12" rx="2" fill="white"/>
  <path d="M52 82 L68 82" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
  </defs>
</svg>